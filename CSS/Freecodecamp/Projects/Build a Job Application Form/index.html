<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Form</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <form>
        <label for="name">Full Name: </label>
        <input type="text" id="name" name="name" required />
        <label for="email">Email: </label>
        <input type="email" id="email" name="email" required />
        <label for="position">Position: </label>
        <select id="position">
          <option value="">Select a position</option>
          <option value="developer">Frontend Developer</option>
          <option value="designer">Backend Designer</option>
          <option value="manager">Team Manager</option>
        </select>
        <fieldset class="radio-group">
          <label> <input type="radio" name="availability" /> Full-time </label>
          <label> <input type="radio" name="availability" /> Part-time </label>
        </fieldset>
        <label for="message">Message: </label>
        <textarea id="message" name="message" rows="5" cols="40"></textarea>
        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
