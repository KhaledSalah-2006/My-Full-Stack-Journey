<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="todo-container">
      <h2>My Daily Tasks</h2>
      <ul class="todo-list">
        <li>
          <input type="checkbox" id="task-1" />
          <label for="task-1">Review HTML lessons</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                href="https://www.freecodecamp.org"
                target="_blank"
                >Official freeCodeCamp Website</a
              >
            </li>
          </ul>
        </li>

        <li>
          <input type="checkbox" id="task-2" />
          <label for="task-2">Practice CSS Challenges</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                href="https://developer.mozilla.org"
                target="_blank"
                >MDN Web Docs for CSS</a
              >
            </li>
          </ul>
        </li>

        <li>
          <input type="checkbox" id="task-3" />
          <label for="task-3">Organize project files</label>
          <ul class="sub-item">
            <li>
              <a class="sub-item-link" href="https://github.com" target="_blank"
                >My GitHub Profile</a
              >
            </li>
          </ul>
        </li>

        <li>
          <input type="checkbox" id="task-4" />
          <label for="task-4">Plan for next week</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                href="https://www.google.com/calendar"
                target="_blank"
                >Google Calendar</a
              >
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </body>
</html>
