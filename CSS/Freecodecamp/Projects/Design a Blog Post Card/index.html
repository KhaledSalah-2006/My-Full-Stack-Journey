<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="blog-post-card">
      <img
        src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
        alt="A beautiful landscape"
        class="post-img"
      />
      <div class="post-content">
        <h2 class="post-title">Learning Web Development</h2>
        <p class="post-excerpt">
          Web development is an exciting skill that allows you to build websites
          and applications for the internet.
        </p>
        <a href="#" class="read-more">Read More</a>
      </div>
    </div>
  </body>
</html>
