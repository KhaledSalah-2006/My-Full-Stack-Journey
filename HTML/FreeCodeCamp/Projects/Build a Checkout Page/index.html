<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Page</title>
  </head>
  <body>
    <h1>Checkout</h1>

    <section>
      <h2>Your Cart</h2>
      <img
        src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg"
        alt="Geometric cube decorative object"
      />
    </section>

    <section>
      <h2>Payment Information</h2>

      <form>
        <label for="card-name">
          Cardholder Name <span aria-hidden="true">*</span>
        </label>
        <br />
        <input type="text" id="card-name" name="card-name" required />
        <br /><br />

        <label for="card-number">
          Card Number <span aria-hidden="true">*</span>
        </label>
        <br />
        <input
          type="text"
          id="card-number"
          name="card-number"
          required
          aria-describedby="card-number-help"
        />

        <p id="card-number-help">
          Enter your 16-digit card number (e.g. 1234 5678 9012 3456).
        </p>

        <br />

        <label for="expiry">
          Expiry Date <span aria-hidden="true">*</span>
        </label>
        <br />
        <input
          type="text"
          id="expiry"
          name="expiry"
          placeholder="MM/YY"
          required
        />
        <br /><br />

        <label for="cvv"> CVV <span aria-hidden="true">*</span> </label>
        <br />
        <input type="text" id="cvv" name="cvv" required />
        <br /><br />

        <label for="email">Email</label>
        <br />
        <input type="email" id="email" name="email" />
        <br /><br />

        <button type="submit">Place Order</button>
      </form>
    </section>
  </body>
</html>
