<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
  </head>
  <body>
    <h1 id="title">Student Survey Form</h1>
    <p id="description">Please fill out this form to help us improve</p>

    <form id="survey-form">
      <fieldset>
        <legend>Personal Information</legend>

        <!-- Name -->
        <label for="name" id="name-label">Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"
          required
        />
        <br />

        <!-- Email -->
        <label for="email" id="email-label">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
        />
        <br />

        <!-- Age -->
        <label for="number" id="number-label">Age:</label>
        <input
          type="number"
          id="number"
          name="age"
          placeholder="Enter your age"
          min="10"
          max="100"
          required
        />
        <br />

        <!-- Dropdown -->
        <label for="dropdown">
          Which option best describes your current role?
        </label>
        <select id="dropdown">
          <option value="">Choose an option</option>
          <option value="student">Student</option>
          <option value="job">Full Time Job</option>
          <option value="learner">Full Time Learner</option>
        </select>

        <br />

        <!-- Radio Buttons -->
        <p>Would you recommend this course?</p>
        <label> <input type="radio" name="recommend" value="yes" /> Yes </label>
        <label> <input type="radio" name="recommend" value="no" /> No </label>

        <br />

        <!-- Checkboxes -->
        <p>What do you like?</p>
        <label> <input type="checkbox" value="content" /> Content </label>
        <label> <input type="checkbox" value="projects" /> Projects </label>

        <br />

        <!-- Textarea -->
        <label for="comments">Additional Comments</label>
        <br />
        <textarea id="comments" rows="4" cols="40"></textarea>

        <br />

        <!-- Submit -->
        <button id="submit" type="submit">Submit</button>
      </fieldset>
    </form>
  </body>
</html>
